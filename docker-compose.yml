version: "3.9"

# ============================================================
# Smart AI Home Hub — Docker Compose
# Chạy: docker compose up -d
# ============================================================

networks:
  frontend_net:    # Nginx ↔ AI Backend
  backend_net:     # AI Backend ↔ Redis ↔ (Postgres nếu cần)
  iot_net:         # AI Backend ↔ Mosquitto

volumes:
  redis_data:
  audit_data:
  mosquitto_data:
  mosquitto_log:

services:

  # ── NGINX — Reverse Proxy & Serve Frontend ────────────────
  nginx:
    image: nginx:alpine
    container_name: smarthub_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro      # React build
    networks:
      - frontend_net
    depends_on:
      - ai-backend
    restart: unless-stopped

  # ── AI BACKEND — FastAPI ──────────────────────────────────
  ai-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smarthub_backend
    env_file:
      - .env
    volumes:
      - ./src:/app/src:ro
      - ./keys:/app/keys:ro           # JWT keys
      - audit_data:/app/data          # Audit log SQLite
      - ./infrastructure/certs:/app/certs:ro
    networks:
      - frontend_net
      - backend_net
      - iot_net
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── REDIS — Cache, Rate Limit, JWT Blacklist ──────────────
  redis:
    image: redis:7-alpine
    container_name: smarthub_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── MOSQUITTO — MQTT Broker TLS ───────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smarthub_mqtt
    ports:
      - "8883:8883"     # TLS (public — cho ESP32)
      # 1883 KHÔNG expose — plain text bị disable
    volumes:
      - ./infrastructure/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./infrastructure/certs:/mosquitto/certs:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - iot_net
    restart: unless-stopped

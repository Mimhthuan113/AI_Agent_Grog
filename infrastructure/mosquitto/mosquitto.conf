# ============================================================
# Mosquitto MQTT Broker — TLS Config
# Port 1883 (plain) DISABLED
# Port 8883 (TLS) với client cert required
# ============================================================

# ── Listeners ────────────────────────────────────────────────
# Không cho phép kết nối plain text
# listener 1883   ← KHÔNG có dòng này

# TLS listener
listener 8883

# ── TLS Config ───────────────────────────────────────────────
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key

# Bắt buộc client phải có cert
require_certificate true
use_identity_as_username true

tls_version tlsv1.2

# ── Auth ─────────────────────────────────────────────────────
allow_anonymous false
password_file /mosquitto/config/passwd

# ── Persistence ──────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ──────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type information
log_timestamp true

# ── Limits ───────────────────────────────────────────────────
max_connections 100
max_inflight_messages 20

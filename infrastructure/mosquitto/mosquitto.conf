# ============================================================
# Mosquitto — MQTT Broker with TLS
# ============================================================
# Port 8883: MQTT over TLS (ESP32 + Backend)
# Port 9001: WebSocket (optional, cho debug)
# ============================================================

# ── General ──────────────────────────────────────
per_listener_settings true
persistence true
persistence_location /mosquitto/data/

# ── Logging ──────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_type all
connection_messages true
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ── Listener 1: MQTT over TLS (port 8883) ───────
listener 8883
protocol mqtt

# TLS certificates
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key

# Require client certificate (mutual TLS)
require_certificate false
# Đặt true khi ESP32 đã có client cert

# TLS version
tls_version tlsv1.2

# ── Authentication ───────────────────────────────
# Password file (user:hashed_password)
password_file /mosquitto/passwd

# Deny anonymous
allow_anonymous false

# ── Listener 2: WebSocket (port 9001) ────────────
listener 9001
protocol websockets

# WebSocket cũng dùng auth
password_file /mosquitto/passwd
allow_anonymous false

# ── ACL (Access Control List) ────────────────────
# Backend chỉ publish/subscribe các topic cho phép
# ESP32 chỉ subscribe topic của device mình

# acl_file /mosquitto/config/acl.conf

# ── Limits ───────────────────────────────────────
max_connections 50
max_inflight_messages 20
max_queued_messages 100
message_size_limit 4096
